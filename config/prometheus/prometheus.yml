# my global config
global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
  # scrape_timeout is set to the global default (10s).

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:

  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  - job_name: 'torchserve_green'
    static_configs:
      - targets: ['torchserve_green:8082']  # TorchServe Green Metrics

  - job_name: 'torchserve_blue'
    static_configs:
      - targets: ['torchserve_blue:8082']  # TorchServe Green Metrics
      
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']  # Node Exporter Metrics

  - job_name: 'train_data_distribution'
    static_configs:
      - targets: ['kafkaconsumer:6000']  # Node Exporter Metrics

